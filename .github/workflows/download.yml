name: Download and Release

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: 'Direct file URL'
        required: true
      zip_it:
        description: 'Zip the file (true/false)'
        required: false
        default: 'false'
      custom_name:
        description: 'Custom filename without extension'
        required: false
        default: ''
      job_id:
        description: 'Unique job id'
        required: true

run-name: "${{ inputs.job_id }}"

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 340
    steps:
      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y aria2 zip

      - name: Download file
        id: dl
        run: |
          ORIGINAL_NAME=$(basename "${{ github.event.inputs.file_url }}" | cut -d'?' -f1)
          EXT="${ORIGINAL_NAME##*.}"
          if [ -z "${{ github.event.inputs.custom_name }}" ]; then
            FILENAME="$ORIGINAL_NAME"
          else
            FILENAME="${{ github.event.inputs.custom_name }}.$EXT"
          fi

          aria2c \
            -x 16 -s 16 -k 1M \
            --connect-timeout=20 \
            --max-tries=5 \
            --retry-wait=5 \
            -o "$FILENAME" \
            "${{ github.event.inputs.file_url }}"

          if [ "${{ github.event.inputs.zip_it }}" = "true" ]; then
            zip "${FILENAME}.zip" "$FILENAME"
            echo "filename=${FILENAME}.zip" >> $GITHUB_OUTPUT
          else
            echo "filename=$FILENAME" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.job_id }}
          files: ${{ steps.dl.outputs.filename }}
          prerelease: true
          name: "Upload ${{ github.event.inputs.job_id }}"
